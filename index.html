<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FL Studio Clone - Piano Roll (Phase 8.2 - Phase 2 Enhancements)</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #2c3032; color: #d0d0d0; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            user-select: none;
            touch-action: none;
            overscroll-behavior: none;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        #toolbar { 
            height: 40px; background-color: #3b4043; border-bottom: 1px solid #1a1c1d; 
            display: flex; align-items: center; padding: 0 10px; font-size: 14px; gap: 15px; flex-shrink: 0;
        }
        
        .tool-btn-group { display: flex; gap: 2px; background-color: #1e2122; padding: 2px; border-radius: 4px; border: 1px solid #1a1c1d; align-items: center; }
        
        .tool-btn { 
            background-color: #3b4043; border: 1px solid #555; color: #d0d0d0; 
            padding: 4px 10px; cursor: pointer; border-radius: 3px; font-size: 12px;
            display: flex; align-items: center; gap: 5px;
        }
        .tool-btn svg { width: 14px; height: 14px; fill: currentColor; stroke: currentColor; stroke-width: 0; }
        
        .tool-btn:hover { background-color: #4b5155; }
        .tool-btn.active { background-color: #ff6600; color: #fff; border-color: #cc5200; font-weight: bold; }
        
        #btn-play.playing { background-color: #33cc33; border-color: #009900; color: #fff; }

        select, input[type="number"] { background-color: #1e2122; color: #d0d0d0; border: 1px solid #555; padding: 3px; border-radius: 3px; outline: none; }
        input[type="number"] { width: 50px; text-align: center; }
        
        .spacer { flex-grow: 1; }
        
        #editor-area { 
            display: flex; flex: 1; overflow: hidden; position: relative;
        }
        
        #track-panel-container {
            width: 200px; background-color: #2c3032; border-right: 1px solid #1a1c1d;
            display: flex; flex-direction: column; transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden; flex-shrink: 0;
        }
        #track-panel-container.closed { width: 0px; border-right: none; }
        
        #track-panel-header {
            height: 30px; background-color: #3b4043; border-bottom: 1px solid #1a1c1d;
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; flex-shrink: 0;
        }

        /* 追加: リファレンストラック用のスタイル */
        #ref-track-container { flex-shrink: 0; border-bottom: 2px solid #1a1c1d; }
        .ref-track-item {
            display: flex; flex-direction: column; padding: 8px; background-color: #242729; gap: 6px;
        }
        .ref-file-label {
            font-size: 10px; background: #3b4043; padding: 4px 6px; border-radius: 3px; cursor: pointer; border: 1px solid #555;
            display: flex; align-items: center; justify-content: center;
        }
        .ref-file-label:hover { background: #4b5155; color: #fff; border-color: #888; }
        .ref-file-name {
            font-size: 11px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-grow: 1; padding-left: 8px;
        }
        
        #track-list { 
            flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; width: 200px; 
        }
        #track-list::-webkit-scrollbar { width: 6px; }
        #track-list::-webkit-scrollbar-track { background: #1e2122; }
        #track-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        
        .track-item {
            display: flex; flex-direction: column; padding: 8px; border-bottom: 1px solid #1a1c1d;
            cursor: pointer; background-color: #2c3032; transition: background-color 0.1s; gap: 6px;
        }
        .track-item:hover { background-color: #3b4043; }
        .track-item.active { background-color: #4b5155; }
        
        .track-item-top {
            display: flex; align-items: center; width: 100%;
        }
        
        .track-color-indicator { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; border: 1px solid #000; flex-shrink: 0; cursor: pointer; }
        .track-name { flex-grow: 1; font-size: 12px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: text; }
        
        .track-controls { display: flex; gap: 4px; }
        .tc-btn { 
            width: 20px; height: 20px; border-radius: 3px; border: 1px solid #555; background-color: #1e2122; 
            color: #aaa; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .tc-btn:hover { border-color: #888; color: #fff; }
        .tc-btn.muted { background-color: #ff3333; color: #fff; border-color: #cc0000; }
        .tc-btn.soloed { background-color: #33cc33; color: #fff; border-color: #009900; }
        
        .track-vol-container {
            display: flex; align-items: center; gap: 5px; padding: 0 4px;
        }
        .track-vol-container label { font-size: 10px; color: #888; }
        .track-vol { flex-grow: 1; accent-color: #ff6600; cursor: pointer; height: 4px; }
        
        #btn-add-track {
            margin: 10px; padding: 6px; background-color: #3b4043; border: 1px dashed #555;
            color: #aaa; cursor: pointer; border-radius: 4px; text-align: center; font-size: 12px;
        }
        #btn-add-track:hover { background-color: #4b5155; color: #fff; border-color: #888; }
        
        #roll-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        
        #timeline-container { height: 30px; display: flex; flex-shrink: 0; }
        #timeline-corner { width: 80px; background-color: #3b4043; border-right: 1px solid #1a1c1d; border-bottom: 1px solid #1a1c1d; flex-shrink: 0; }
        #timeline-canvas { flex: 1; background-color: #3b4043; border-bottom: 1px solid #1a1c1d; touch-action: none; cursor: pointer; }
        
        #grid-container { display: flex; flex: 1; overflow: hidden; }
        #keyboard-canvas { width: 80px; background-color: #1e2122; border-right: 1px solid #1a1c1d; flex-shrink: 0; touch-action: none; cursor: pointer; }
        #grid-canvas { flex: 1; background-color: #1e2122; outline: none; touch-action: none; }
        
        #synth-modal, #color-picker-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: #2c3032; border: 1px solid #555; border-radius: 8px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
        }
        #synth-modal { width: 300px; }
        #color-picker-modal { width: 240px; padding: 15px; }
        
        #synth-modal.show, #color-picker-modal.show { display: block; }
        
        .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #ff6600; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; }
        .modal-row select, .modal-row input[type="range"] { width: 150px; }
        .modal-close-btn { width: 100%; padding: 8px; margin-top: 10px; background-color: #3b4043; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; }
        
        .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-bottom: 10px; }
        .color-cell { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid #111; }
        .color-cell:hover { transform: scale(1.2); box-shadow: 0 0 5px rgba(255,255,255,0.8); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="toolbar">
        <button class="tool-btn" id="btn-toggle-panel" title="Toggle Track Panel">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        
        <div class="tool-btn-group">
            <button class="tool-btn" id="btn-play" title="Play/Stop (Space)">
                <svg viewBox="0 0 24 24" fill="currentColor" id="icon-play"><path d="M8 5v14l11-7z"/></svg> <span id="label-play">Play</span>
            </button>
        </div>
        
        <div class="tool-btn-group">
            <button class="tool-btn active" id="btn-draw" title="Draw (P)">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg> Draw
            </button>
            <button class="tool-btn" id="btn-select" title="Select (E)">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg> Select
            </button>
            <button class="tool-btn" id="btn-mute" title="Mute (T)">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg> Mute
            </button>
            <button class="tool-btn" id="btn-delete" title="Delete (D)">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> Delete
            </button>
        </div>
        <div>
            <label for="snap-select">🧲 Snap:</label>
            <select id="snap-select">
                <option value="384">Bar</option>
                <option value="96">Beat</option>
                <option value="48">1/2 Beat</option>
                <option value="24" selected>Step</option>
                <option value="12">1/2 Step</option>
                <option value="6">1/4 Step</option>
                <option value="4">1/6 Step</option>
                <option value="0">None</option>
            </select>
        </div>
        <div>
            <label for="bpm-input">⏱ BPM:</label>
            <input type="number" id="bpm-input" value="120" min="20" max="300">
        </div>
        <div class="tool-btn-group" style="padding: 0 5px;">
            <label for="transpose-input" style="font-size: 12px; margin-right: 2px;">Trans:</label>
            <input type="number" id="transpose-input" value="0" min="-24" max="24" style="width: 35px;">
        </div>
        
        <div class="spacer"></div>
        <button class="tool-btn" id="btn-export" title="Export as .mid" style="background-color: #2a5a2a; border-color: #1e401e;">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Export
        </button>
    </div>
    
    <div id="editor-area">
        <div id="track-panel-container">
            <div id="track-panel-header">TRACKS</div>
            <!-- 追加: リファレンストラックコンテナ -->
            <div id="ref-track-container"></div>
            <div id="track-list"></div>
        </div>
        
        <div id="roll-area">
            <div id="timeline-container">
                <div id="timeline-corner"></div>
                <canvas id="timeline-canvas"></canvas>
            </div>
            <div id="grid-container">
                <canvas id="keyboard-canvas"></canvas>
                <canvas id="grid-canvas" tabindex="0"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="synth-modal">
    <div class="modal-title" id="modal-track-name">Track Settings</div>
    <div class="modal-row">
        <label>Waveform</label>
        <select id="synth-waveform">
            <option value="sawtooth">Sawtooth</option>
            <option value="square">Square</option>
            <option value="triangle">Triangle</option>
            <option value="sine">Sine</option>
        </select>
    </div>
    <div class="modal-row">
        <label>Attack (ms)</label>
        <input type="range" id="synth-attack" min="0.1" max="1000" step="1" value="0.1">
    </div>
    <div class="modal-row">
        <label>Decay (ms)</label>
        <input type="range" id="synth-decay" min="1" max="2000" step="1" value="100">
    </div>
    <div class="modal-row">
        <label>Sustain (%)</label>
        <input type="range" id="synth-sustain" min="0" max="100" step="1" value="75">
    </div>
    <div class="modal-row">
        <label>Release (ms)</label>
        <input type="range" id="synth-release" min="1" max="3000" step="1" value="5">
    </div>
    <button class="modal-close-btn" id="modal-close">Done</button>
</div>

<div id="color-picker-modal">
    <div class="modal-title" style="font-size: 14px;">Select Track Color</div>
    <div class="color-grid" id="color-grid"></div>
    <button class="modal-close-btn" id="color-modal-close">Cancel</button>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
