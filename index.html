<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FL Studio Clone - Piano Roll (Phase 8 - Track Panel)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c3032; color: #d0d0d0; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        #app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        #toolbar { height: 40px; background-color: #3b4043; border-bottom: 1px solid #1a1c1d; display: flex; align-items: center; padding: 0 15px; font-size: 14px; gap: 20px; }
        
        .tool-btn-group { display: flex; gap: 2px; background-color: #1e2122; padding: 2px; border-radius: 4px; border: 1px solid #1a1c1d; }
        .tool-btn { background-color: #3b4043; border: 1px solid #555; color: #d0d0d0; padding: 4px 12px; cursor: pointer; border-radius: 3px; font-size: 12px; }
        .tool-btn:hover { background-color: #4b5155; }
        .tool-btn.active { background-color: #ff6600; color: #fff; border-color: #cc5200; font-weight: bold; }

        select, input[type="number"] { background-color: #1e2122; color: #d0d0d0; border: 1px solid #555; padding: 3px; border-radius: 3px; outline: none; }
        input[type="number"] { width: 50px; text-align: center; }
        
        .spacer { flex-grow: 1; }
        #btn-export { background-color: #2a5a2a; border-color: #1e401e; font-weight: bold; }
        #btn-export:hover { background-color: #3a7a3a; }

        /* エディタエリアのレイアウト変更 (左側の幅を広げてトラックパネルを配置) */
        #editor-area { 
            display: grid; 
            grid-template-columns: 200px 1fr; /* 左側(パネル+鍵盤)を200pxに拡張 */
            grid-template-rows: 30px 1fr; 
            flex: 1; 
            overflow: hidden; 
        }
        
        #top-left-panel { background-color: #3b4043; border-right: 1px solid #1a1c1d; border-bottom: 1px solid #1a1c1d; }
        
        /* トラックリストのスタイル */
        #track-list { 
            background-color: #2c3032; 
            border-right: 1px solid #1a1c1d; 
            overflow-y: auto; /* 縦スクロール可能に */
            display: flex;
            flex-direction: column;
        }
        
        /* スクロールバーのカスタマイズ (Webkit系) */
        #track-list::-webkit-scrollbar { width: 8px; }
        #track-list::-webkit-scrollbar-track { background: #1e2122; }
        #track-list::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        
        .track-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #1a1c1d;
            cursor: pointer;
            background-color: #2c3032;
            transition: background-color 0.1s;
        }
        .track-item:hover { background-color: #3b4043; }
        .track-item.active { background-color: #4b5155; }
        
        .track-color-indicator { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; border: 1px solid #000; flex-shrink: 0; }
        .track-name { flex-grow: 1; font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* トラックごとのコントロールボタン */
        .track-controls { display: flex; gap: 4px; }
        .tc-btn { 
            width: 20px; height: 20px; border-radius: 3px; border: 1px solid #555; background-color: #1e2122; 
            color: #aaa; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .tc-btn:hover { border-color: #888; color: #fff; }
        
        /* 状態ごとのボタンスタイル */
        .tc-btn.muted { background-color: #ff3333; color: #fff; border-color: #cc0000; }
        .tc-btn.soloed { background-color: #33cc33; color: #fff; border-color: #009900; }
        
        canvas { display: block; }
        #timeline-canvas { background-color: #3b4043; border-bottom: 1px solid #1a1c1d; }
        #grid-canvas { background-color: #1e2122; outline: none; }
        
        /* 音色設定モーダル (初期は非表示) */
        #synth-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: #2c3032; border: 1px solid #555; border-radius: 8px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; width: 300px;
        }
        #synth-modal.show { display: block; }
        .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #ff6600; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; }
        .modal-row select, .modal-row input[type="range"] { width: 150px; }
        .modal-close-btn { width: 100%; padding: 8px; margin-top: 10px; background-color: #3b4043; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; }
        .modal-close-btn:hover { background-color: #555; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="toolbar">
        <div class="tool-btn-group">
            <button class="tool-btn active" id="btn-draw" title="Draw (P)">✏️ Draw</button>
            <button class="tool-btn" id="btn-select" title="Select (E)">🟩 Select</button>
            <button class="tool-btn" id="btn-mute" title="Mute (T)">🔇 Mute</button>
            <button class="tool-btn" id="btn-delete" title="Delete (D)">❌ Delete</button>
        </div>
        <div>
            <label for="snap-select">🧲 Snap:</label>
            <select id="snap-select">
                <option value="384">Bar</option>
                <option value="96">Beat</option>
                <option value="48">1/2 Beat</option>
                <option value="24" selected>Step</option>
                <option value="12">1/2 Step</option>
                <option value="6">1/4 Step</option>
                <option value="4">1/6 Step</option>
                <option value="0">None</option>
            </select>
        </div>
        <div>
            <label for="bpm-input">⏱ BPM:</label>
            <input type="number" id="bpm-input" value="120" min="20" max="300">
        </div>
        
        <div class="spacer"></div>
        <button class="tool-btn" id="btn-export" title="Export as .mid">💾 Export MIDI</button>
    </div>
    
    <div id="editor-area">
        <!-- 左上の空白部分 -->
        <div id="top-left-panel"></div>
        <!-- タイムライン -->
        <canvas id="timeline-canvas"></canvas>
        
        <!-- 左側のトラックパネル（鍵盤を置き換え/または統合） -->
        <div id="track-list">
            <!-- トラック項目は main.js で動的に生成されます -->
        </div>
        
        <!-- メイングリッド -->
        <canvas id="grid-canvas" tabindex="0"></canvas>
    </div>
</div>

<!-- シンセサイザー音色設定モーダル -->
<div id="synth-modal">
    <div class="modal-title" id="modal-track-name">Track Settings</div>
    <div class="modal-row">
        <label>Waveform</label>
        <select id="synth-waveform">
            <option value="sawtooth">Sawtooth</option>
            <option value="square">Square</option>
            <option value="triangle">Triangle</option>
            <option value="sine">Sine</option>
        </select>
    </div>
    <div class="modal-row">
        <label>Attack (sec)</label>
        <input type="range" id="synth-attack" min="0" max="2" step="0.01" value="0.02">
    </div>
    <div class="modal-row">
        <label>Decay (sec)</label>
        <input type="range" id="synth-decay" min="0" max="2" step="0.01" value="0.3">
    </div>
    <div class="modal-row">
        <label>Sustain (lvl)</label>
        <input type="range" id="synth-sustain" min="0" max="1" step="0.01" value="0.4">
    </div>
    <div class="modal-row">
        <label>Release (sec)</label>
        <input type="range" id="synth-release" min="0" max="3" step="0.01" value="0.3">
    </div>
    <button class="modal-close-btn" id="modal-close">Done</button>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
