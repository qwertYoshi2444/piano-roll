<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FL Studio Clone - Piano Roll (Phase 6)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c3032; color: #d0d0d0; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        #app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        #toolbar { height: 40px; background-color: #3b4043; border-bottom: 1px solid #1a1c1d; display: flex; align-items: center; padding: 0 10px; font-size: 14px; gap: 15px; }
        
        .tool-btn-group { display: flex; gap: 2px; background-color: #1e2122; padding: 2px; border-radius: 4px; border: 1px solid #1a1c1d; }
        .tool-btn { background-color: #3b4043; border: 1px solid #555; color: #d0d0d0; padding: 4px 10px; cursor: pointer; border-radius: 3px; font-size: 12px; }
        .tool-btn:hover { background-color: #4b5155; }
        .tool-btn.active { background-color: #ff6600; color: #fff; border-color: #cc5200; font-weight: bold; }

        select, input[type="number"] { background-color: #1e2122; color: #d0d0d0; border: 1px solid #555; padding: 3px; border-radius: 3px; outline: none; }
        input[type="number"] { width: 50px; text-align: center; }
        
        #track-select { font-weight: bold; color: #fff; border-color: #888; }
        
        .spacer { flex-grow: 1; }
        #btn-export { background-color: #2a5a2a; border-color: #1e401e; font-weight: bold; }
        #btn-export:hover { background-color: #3a7a3a; }

        #editor-area { display: grid; grid-template-columns: 80px 1fr; grid-template-rows: 30px 1fr; flex: 1; overflow: hidden; }
        #corner { background-color: #3b4043; border-right: 1px solid #1a1c1d; border-bottom: 1px solid #1a1c1d; display: flex; align-items: center; justify-content: center; }
        
        canvas { display: block; }
        #timeline-canvas { background-color: #3b4043; border-bottom: 1px solid #1a1c1d; }
        #keyboard-canvas { background-color: #1e2122; border-right: 1px solid #1a1c1d; }
        #grid-canvas { background-color: #1e2122; outline: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="toolbar">
        <div>
            <label for="track-select">🎹 Track:</label>
            <select id="track-select"></select>
        </div>
        <div class="tool-btn-group">
            <button class="tool-btn active" id="btn-draw" title="Draw (P)">✏️ Draw</button>
            <button class="tool-btn" id="btn-select" title="Select (E)">🟩 Select</button>
            <button class="tool-btn" id="btn-mute" title="Mute (T)">🔇 Mute</button>
            <button class="tool-btn" id="btn-delete" title="Delete (D)">❌ Delete</button>
        </div>
        <div>
            <label for="snap-select">🧲 Snap:</label>
            <select id="snap-select">
                <option value="384">Bar</option>
                <option value="96">Beat</option>
                <option value="48">1/2 Beat</option>
                <option value="24" selected>Step</option>
                <option value="12">1/2 Step</option>
                <option value="6">1/4 Step</option>
                <option value="4">1/6 Step</option>
                <option value="0">None</option>
            </select>
        </div>
        <div>
            <label for="bpm-input">⏱ BPM:</label>
            <input type="number" id="bpm-input" value="120" min="20" max="300">
        </div>
        
        <div class="spacer"></div>
        <button class="tool-btn" id="btn-export" title="Export as .mid">💾 Export MIDI</button>
    </div>
    <div id="editor-area">
        <div id="corner"></div>
        <canvas id="timeline-canvas"></canvas>
        <canvas id="keyboard-canvas"></canvas>
        <canvas id="grid-canvas" tabindex="0"></canvas>
    </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
