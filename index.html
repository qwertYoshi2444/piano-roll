<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FL Studio Clone - Piano Roll (Phase 10 - MIDI Load)</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #2c3032; color: #d0d0d0; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; user-select: none; touch-action: none; overscroll-behavior: none;
            padding-bottom: env(safe-area-inset-bottom); padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right);
        }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        #toolbar { 
            height: 40px; background-color: #3b4043; border-bottom: 1px solid #1a1c1d; 
            display: flex; align-items: center; padding: 0 10px; font-size: 14px; gap: 15px; flex-shrink: 0;
        }
        
        .tool-btn-group { display: flex; gap: 2px; background-color: #1e2122; padding: 2px; border-radius: 4px; border: 1px solid #1a1c1d; }
        
        .tool-btn { 
            background-color: #3b4043; border: 1px solid #555; color: #d0d0d0; 
            padding: 4px 10px; cursor: pointer; border-radius: 3px; font-size: 12px;
            display: flex; align-items: center; gap: 5px;
        }
        .tool-btn svg { width: 14px; height: 14px; fill: currentColor; stroke: currentColor; stroke-width: 0; }
        .tool-btn:hover { background-color: #4b5155; }
        .tool-btn.active { background-color: #ff6600; color: #fff; border-color: #cc5200; font-weight: bold; }
        #btn-play.playing { background-color: #33cc33; border-color: #009900; color: #fff; }

        select, input[type="number"], input[type="text"] { 
            background-color: #1e2122; color: #d0d0d0; border: 1px solid #555; padding: 3px; border-radius: 3px; outline: none; 
        }
        input[type="number"] { width: 50px; text-align: center; }
        
        /* --- 追加: ドロップダウンメニューのスタイル --- */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 100%; background-color: #2c3032;
            min-width: 140px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 2000;
            border: 1px solid #555; border-radius: 4px; padding: 4px 0;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-item {
            color: #d0d0d0; padding: 8px 16px; text-decoration: none; display: block; font-size: 13px; cursor: pointer;
        }
        .dropdown-item:hover { background-color: #4b5155; color: #fff; }
        
        /* 隠しファイルインプット */
        #midi-file-input { display: none; }

        .spacer { flex-grow: 1; }
        
        #editor-area { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        #track-panel-container {
            width: 220px; background-color: #2c3032; border-right: 1px solid #1a1c1d;
            display: flex; flex-direction: column; transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden; flex-shrink: 0;
        }
        #track-panel-container.closed { width: 0px; border-right: none; }
        
        #track-panel-header {
            height: 30px; background-color: #3b4043; border-bottom: 1px solid #1a1c1d; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; letter-spacing: 1px;
        }
        
        #track-list-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 220px; }
        
        #track-list { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; }
        #track-list::-webkit-scrollbar { width: 6px; }
        #track-list::-webkit-scrollbar-track { background: #1e2122; }
        #track-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        
        .track-item {
            display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #1a1c1d;
            cursor: pointer; background-color: #2c3032; transition: background-color 0.1s;
        }
        .track-item:hover { background-color: #3b4043; }
        .track-item.active { background-color: #4b5155; }
        
        .track-color-indicator { width: 14px; height: 14px; border-radius: 50%; margin-right: 8px; border: 1px solid #000; flex-shrink: 0; cursor: pointer; }
        .track-color-indicator:hover { border-color: #fff; transform: scale(1.1); }
        
        .track-name-input { 
            flex-grow: 1; font-size: 12px; font-weight: bold; background: transparent; border: none; color: inherit;
            padding: 2px 4px; margin-right: 4px; width: 100%; text-overflow: ellipsis; cursor: pointer;
        }
        .track-name-input:focus { background-color: #1e2122; border: 1px solid #555; cursor: text; }
        
        .track-controls { display: flex; gap: 4px; flex-shrink: 0; }
        .tc-btn { 
            width: 22px; height: 22px; border-radius: 3px; border: 1px solid #555; background-color: #1e2122; 
            color: #aaa; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .tc-btn:hover { border-color: #888; color: #fff; }
        .tc-btn.muted { background-color: #ff3333; color: #fff; border-color: #cc0000; }
        .tc-btn.soloed { background-color: #33cc33; color: #fff; border-color: #009900; }
        
        #btn-add-track {
            padding: 10px; background-color: #3b4043; border: none; border-top: 1px solid #1a1c1d; color: #d0d0d0;
            cursor: pointer; font-size: 12px; font-weight: bold; text-align: center; flex-shrink: 0;
        }
        #btn-add-track:hover { background-color: #4b5155; color: #fff; }
        
        #roll-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        
        #timeline-container { height: 30px; display: flex; flex-shrink: 0; }
        #timeline-corner { width: 80px; background-color: #3b4043; border-right: 1px solid #1a1c1d; border-bottom: 1px solid #1a1c1d; flex-shrink: 0; }
        #timeline-canvas { flex: 1; background-color: #3b4043; border-bottom: 1px solid #1a1c1d; touch-action: none; cursor: pointer; }
        
        #grid-container { display: flex; flex: 1; overflow: hidden; }
        #keyboard-canvas { width: 80px; background-color: #1e2122; border-right: 1px solid #1a1c1d; flex-shrink: 0; touch-action: none; cursor: pointer; }
        #grid-canvas { flex: 1; background-color: #1e2122; outline: none; touch-action: none; }
        
        /* モーダル */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 999; }
        .modal-overlay.show { display: block; }
        
        .modal-window {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: #2c3032; border: 1px solid #555; border-radius: 8px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 1000; width: 300px;
        }
        .modal-window.show { display: block; }
        .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #fff; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; }
        .modal-row select, .modal-row input[type="range"] { width: 150px; }
        .modal-btn { width: 100%; padding: 8px; margin-top: 10px; background-color: #3b4043; border: 1px solid #555; color: #fff; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .modal-btn:hover { background-color: #555; }
        
        #color-palette { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-bottom: 15px; }
        .color-swatch { width: 24px; height: 24px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-swatch:hover { border-color: #fff; transform: scale(1.1); }
        .color-swatch.selected { border-color: #fff; box-shadow: 0 0 5px #fff; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="toolbar">
        <button class="tool-btn" id="btn-toggle-panel" title="Toggle Track Panel">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        
        <div class="tool-btn-group">
            <button class="tool-btn" id="btn-play" title="Play/Stop (Space)">
                <svg viewBox="0 0 24 24" fill="currentColor" id="icon-play"><path d="M8 5v14l11-7z"/></svg> <span id="label-play">Play</span>
            </button>
        </div>
        
        <div class="tool-btn-group">
            <button class="tool-btn active" id="btn-draw" title="Draw (P)">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg> Draw
            </button>
            <button class="tool-btn" id="btn-select" title="Select (E)">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg> Select
            </button>
            <button class="tool-btn" id="btn-mute" title="Mute (T)">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg> Mute
            </button>
            <button class="tool-btn" id="btn-delete" title="Delete (D)">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> Delete
            </button>
        </div>
        <div>
            <label for="snap-select">🧲 Snap:</label>
            <select id="snap-select">
                <option value="384">Bar</option>
                <option value="96">Beat</option>
                <option value="48">1/2 Beat</option>
                <option value="24" selected>Step</option>
                <option value="12">1/2 Step</option>
                <option value="6">1/4 Step</option>
                <option value="4">1/6 Step</option>
                <option value="0">None</option>
            </select>
        </div>
        
        <div>
            <label for="bpm-input">⏱ BPM:</label>
            <input type="number" id="bpm-input" value="120" min="20" max="300">
        </div>
        
        <!-- 追加: Transpose 設定 -->
        <div>
            <label for="transpose-input">Transpose:</label>
            <input type="number" id="transpose-input" value="0" min="-24" max="24"> st
        </div>
        
        <div class="spacer"></div>
        
        <!-- 追加: ドロップダウン File メニュー -->
        <div class="dropdown">
            <button class="tool-btn" style="background-color: #3b4043;">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> File ▼
            </button>
            <div class="dropdown-content">
                <a class="dropdown-item" id="menu-load-midi">📂 Load MIDI...</a>
                <a class="dropdown-item" id="menu-export-midi">💾 Export MIDI</a>
            </div>
        </div>
        <input type="file" id="midi-file-input" accept=".mid,.midi">
    </div>
    
    <div id="editor-area">
        <div id="track-panel-container">
            <div id="track-panel-header">TRACKS</div>
            <div id="track-list-wrapper">
                <div id="track-list"></div>
                <button id="btn-add-track">＋ Add Track</button>
            </div>
        </div>
        
        <div id="roll-area">
            <div id="timeline-container">
                <div id="timeline-corner"></div>
                <canvas id="timeline-canvas"></canvas>
            </div>
            <div id="grid-container">
                <canvas id="keyboard-canvas"></canvas>
                <canvas id="grid-canvas" tabindex="0"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="modal-overlay" class="modal-overlay"></div>

<div id="synth-modal" class="modal-window">
    <div class="modal-title" id="modal-track-name">Track Settings</div>
    <div class="modal-row">
        <label>Waveform</label>
        <select id="synth-waveform">
            <option value="sawtooth">Sawtooth</option>
            <option value="square">Square</option>
            <option value="triangle">Triangle</option>
            <option value="sine">Sine</option>
        </select>
    </div>
    <div class="modal-row">
        <label>Attack (ms)</label>
        <input type="range" id="synth-attack" min="0.1" max="1000" step="0.1" value="0.1">
    </div>
    <div class="modal-row">
        <label>Decay (ms)</label>
        <input type="range" id="synth-decay" min="1" max="2000" step="1" value="100">
    </div>
    <div class="modal-row">
        <label>Sustain (%)</label>
        <input type="range" id="synth-sustain" min="0" max="100" step="1" value="75">
    </div>
    <div class="modal-row">
        <label>Release (ms)</label>
        <input type="range" id="synth-release" min="1" max="3000" step="1" value="5">
    </div>
    <button class="modal-btn" id="modal-close">Done</button>
</div>

<div id="color-modal" class="modal-window">
    <div class="modal-title">Select Track Color</div>
    <div id="color-palette"></div>
    <button class="modal-btn" id="color-modal-close">Done</button>
</div>

<!-- ロード時の確認ダイアログ (カスタムモーダル) -->
<div id="load-midi-modal" class="modal-window">
    <div class="modal-title">Import MIDI File</div>
    <p style="font-size: 13px; color: #aaa; margin-bottom: 20px;">
        How would you like to import this file?
    </p>
    <div class="modal-row">
        <label>Import Mode:</label>
        <select id="load-mode-select">
            <option value="replace">Replace (Clear all tracks)</option>
            <option value="merge">Merge (Add as new tracks)</option>
        </select>
    </div>
    <div class="modal-row" id="load-bpm-row">
        <label>Import BPM:</label>
        <select id="load-bpm-select">
            <option value="keep">Keep Current BPM</option>
            <option value="import">Use MIDI BPM</option>
        </select>
    </div>
    <button class="modal-btn" id="btn-confirm-load" style="background-color: #2a5a2a; border-color: #1e401e; margin-top: 20px;">Import</button>
    <button class="modal-btn" id="btn-cancel-load" style="background-color: transparent; border: none; margin-top: 5px;">Cancel</button>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
